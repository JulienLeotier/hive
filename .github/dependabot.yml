version: 2
updates:
  # Go modules.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "deps"
      - "go"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # npm (dashboard).
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    labels:
      - "deps"
      - "web"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    # Les majors de vite/svelte-kit cassent régulièrement — ignore
    # pour qu'on les bump manuellement avec les tests qui vont bien.
    ignore:
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/kit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@sveltejs/vite-plugin-svelte"
        update-types: ["version-update:semver-major"]
      - dependency-name: "svelte"
        update-types: ["version-update:semver-major"]

  # GitHub Actions.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "deps"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
