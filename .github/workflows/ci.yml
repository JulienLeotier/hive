name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test + coverage
        run: |
          go test -race -timeout 2m -coverprofile=coverage.out \
            ./internal/agent/... \
            ./internal/task/... \
            ./internal/workflow/... \
            ./internal/event/... \
            ./internal/api/... \
            ./internal/auth/... \
            ./internal/resilience/... \
            ./internal/storage/...
          go tool cover -func=coverage.out | tail -n1

      - name: Assert coverage >= 80% on core packages
        run: |
          total=$(go tool cover -func=coverage.out | tail -n1 | awk '{print $3}' | tr -d '%')
          echo "core coverage: ${total}%"
          awk -v c="$total" 'BEGIN { exit (c+0 >= 80) ? 0 : 1 }'

      - name: Full test suite
        run: go test -race -timeout 5m ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...
