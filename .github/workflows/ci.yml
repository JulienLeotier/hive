name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      # `go build ./...` fails without this step because internal/dashboard
      # uses //go:embed dist/* and dist/ is gitignored (generated output).
      # Build the static bundle first so embed has something to attach to.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build dashboard bundle
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Core-package coverage
        run: |
          # BMAD core packages. A regression here breaks the build
          # pipeline (idea → PRD → plan → code → review → ship).
          # Excludes api (integration tests) and storage (Postgres
          # paths need a live server, covered in the postgres job).
          go test -race -timeout 2m -coverprofile=coverage.out \
            ./internal/architect/... \
            ./internal/devloop/... \
            ./internal/event/... \
            ./internal/intake/... \
            ./internal/project/...
          go tool cover -func=coverage.out | tail -n1

      - name: Assert core coverage >= 40%
        run: |
          # Threshold is 40% post-pivot because a chunk of the BMAD
          # core is Claude-CLI adapters (claude_code.go in devloop+
          # intake+architect) whose happy path is gated behind the
          # claude_e2e build tag and doesn't count in unit coverage.
          # project/ is a thin data-access layer exercised
          # transitively by architect/ + intake/ + api/ tests. Raise
          # back once those adapters get contract-style tests against
          # a fake CLI.
          total=$(go tool cover -func=coverage.out | tail -n1 | awk '{print $3}' | tr -d '%')
          echo "core coverage: ${total}%"
          awk -v c="$total" 'BEGIN { exit (c+0 >= 40) ? 0 : 1 }'

      - name: Full test suite
        run: go test -race -timeout 5m ./...

      - name: BMAD wiring smoke-test (fake-claude)
        run: |
          # Installe fake-claude en première place dans le PATH pour que
          # les hive.bmad.Runner.Invoke() appellent un stub qui renvoie
          # l'envelope JSON attendue sans consommer de tokens. Permet
          # d'exercer le chemin code « Claude répond » en CI sans
          # secrets ni dépendance externe.
          mkdir -p "$RUNNER_TEMP/fake-bin"
          cp scripts/fake-claude.sh "$RUNNER_TEMP/fake-bin/claude"
          chmod +x "$RUNNER_TEMP/fake-bin/claude"
          export PATH="$RUNNER_TEMP/fake-bin:$PATH"
          # Smoke : bmad.NewRunner() doit détecter le faux claude et
          # Invoke() parser son envelope JSON sans erreur.
          go test -race -timeout 2m -run 'TestExtractPRURL|TestPlanning|TestIteration|TestFullPlanning|TestStoryStatus' ./internal/bmad/...

  postgres-integration:
    name: Postgres Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: hive
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: Run Postgres-backed tests
        env:
          POSTGRES_URL: postgres://postgres:hive@localhost:5432/postgres?sslmode=disable
        run: go test -race -timeout 2m -run Postgres ./internal/storage/...

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      # golangci-lint's typecheck runs the same embed directive Go does,
      # so we need the frontend bundle on disk before invoking it.
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build dashboard bundle
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: golangci-lint
        # Pinned to the v2.x major matching our .golangci.yml schema.
        # staticcheck is included in the configured linter set, so this
        # replaces the previous standalone staticcheck job.
        #
        # version: latest — because older v2.x lines were built against Go
        # 1.24 and refuse to parse a Go 1.26 go.mod. `latest` tracks the
        # newest v2 release which keeps pace with Go's toolchain.
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  vuln:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install web deps
        working-directory: web
        run: npm ci
      - name: npm audit (fail on high+)
        working-directory: web
        run: npm audit --audit-level=high

  frontend:
    name: Frontend (svelte-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: svelte-check
        working-directory: web
        run: npm run check
      - name: Build
        working-directory: web
        run: npm run build
