name: content-pipeline
tasks:
  - name: write
    type: content-write
    input:
      topic: "{{topic}}"
      length: 1200
  - name: edit
    type: content-edit
    depends_on: [write]
  - name: optimize
    type: seo-optimize
    depends_on: [edit]
  - name: publish
    type: publish
    depends_on: [optimize]
    input:
      platform: ghost
